<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>SNAKE</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #0e0e10;
  --surface:     #141416;
  --surface-2:   #1a1a1e;
  --border:      rgba(255,255,255,0.06);
  --border-mid:  rgba(255,255,255,0.10);
  --accent:      #e8ff7a;
  --accent-dim:  rgba(232,255,122,0.18);
  --accent-glow: rgba(232,255,122,0.08);
  --text-1:      #f0f0f0;
  --text-2:      #888;
  --text-3:      #444;
  --danger:      #ff6b6b;
  --mono:        'DM Mono', monospace;
  --sans:        'Syne', sans-serif;
  --radius-sm:   8px;
  --radius-md:   14px;
  --radius-lg:   20px;
  --radius-xl:   28px;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  position: fixed;
  background: var(--bg);
  font-family: var(--sans);
  touch-action: none;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

/* ── SHELL ──────────────────────────────────── */
#shell {
  position: relative;
  width: 100%; height: 100%;
  display: grid;
  grid-template-rows: auto 1fr auto auto;
  grid-template-columns: 1fr;
  grid-template-areas: "hud" "board" "dpad" "bar";
  padding:
    max(12px, env(safe-area-inset-top))
    max(12px, env(safe-area-inset-right))
    max(8px,  env(safe-area-inset-bottom))
    max(12px, env(safe-area-inset-left));
  gap: 0;
}

/* ── HUD ────────────────────────────────────── */
#hud {
  grid-area: hud;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 4px 10px;
  flex-shrink: 0;
}

.hud-block {
  display: flex;
  flex-direction: column;
  gap: 1px;
  min-width: 64px;
}
.hud-block.right { align-items: flex-end; }

.hud-label {
  font-family: var(--mono);
  font-size: clamp(7px, 1.6vmin, 10px);
  letter-spacing: 0.12em;
  color: var(--text-3);
  text-transform: uppercase;
}
.hud-value {
  font-family: var(--mono);
  font-weight: 500;
  font-size: clamp(14px, 3.2vmin, 22px);
  color: var(--text-1);
  letter-spacing: -0.02em;
  transition: color 0.15s;
}
.hud-value.accented { color: var(--accent); }

#hud-logo {
  font-family: var(--sans);
  font-weight: 800;
  font-size: clamp(13px, 3.5vmin, 22px);
  letter-spacing: 0.22em;
  color: var(--text-1);
  text-transform: uppercase;
}

/* ── BOARD ──────────────────────────────────── */
#board-area {
  grid-area: board;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 0;
  padding: 2px 0;
}

#board-frame {
  border-radius: var(--radius-xl);
  background: var(--surface);
  border: 1px solid var(--border);
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.02),
    0 24px 64px rgba(0,0,0,0.6),
    inset 0 1px 0 rgba(255,255,255,0.04);
  overflow: hidden;
  position: relative;
}

#canvas-wrap {
  position: relative;
  display: block;
  line-height: 0;
}
#gc { display: block; }

/* ── OVERLAYS ───────────────────────────────── */
.overlay {
  position: absolute; inset: 0;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: clamp(6px, 1.6vmin, 14px);
  background: rgba(14,14,16,0.92);
  backdrop-filter: blur(2px);
  z-index: 10;
  padding: 20px;
  animation: ovIn 0.2s cubic-bezier(0.16,1,0.3,1);
}
.overlay.active { display: flex; }

@keyframes ovIn {
  from { opacity: 0; transform: scale(0.97); }
  to   { opacity: 1; transform: scale(1); }
}

.ov-eyebrow {
  font-family: var(--mono);
  font-size: clamp(8px, 1.5vmin, 10px);
  letter-spacing: 0.2em;
  color: var(--text-3);
  text-transform: uppercase;
}

.ov-title {
  font-family: var(--sans);
  font-weight: 800;
  font-size: clamp(18px, 5vmin, 38px);
  color: var(--text-1);
  letter-spacing: -0.02em;
  text-align: center;
  line-height: 1;
}
.ov-title.danger { color: var(--danger); }

.ov-divider {
  width: 32px; height: 1px;
  background: var(--border-mid);
}

.ov-stat-row {
  display: flex;
  gap: clamp(16px, 4vmin, 32px);
}
.ov-stat {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}
.ov-stat-label {
  font-family: var(--mono);
  font-size: clamp(7px, 1.4vmin, 9px);
  letter-spacing: 0.16em;
  color: var(--text-3);
  text-transform: uppercase;
}
.ov-stat-val {
  font-family: var(--mono);
  font-size: clamp(16px, 4vmin, 28px);
  font-weight: 500;
  color: var(--text-1);
}
.ov-stat-val.gold {
  color: var(--accent);
  filter: drop-shadow(0 0 8px rgba(232,255,122,0.4));
}

.ov-keys {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
  margin-top: 2px;
}
.ov-key {
  font-family: var(--mono);
  font-size: clamp(7px, 1.5vmin, 9px);
  color: var(--text-3);
  background: var(--surface-2);
  border: 1px solid var(--border-mid);
  border-radius: 4px;
  padding: 2px 6px;
  letter-spacing: 0.06em;
}

.ov-cta {
  font-family: var(--mono);
  font-size: clamp(8px, 1.6vmin, 10px);
  color: var(--text-3);
  letter-spacing: 0.14em;
  animation: blink 1.6s step-end infinite;
  margin-top: 2px;
}
@keyframes blink { 50% { opacity: 0; } }

/* ── D-PAD ──────────────────────────────────── */
#dpad-zone {
  grid-area: dpad;
  display: none;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  padding: 8px 0 4px;
}
#dpad-zone.visible { display: flex; }

#dpad {
  display: grid;
  grid-template-columns: repeat(3, var(--dp));
  grid-template-rows:    repeat(3, var(--dp));
  gap: 6px;
  --dp: 52px;
}

.dp-btn {
  border-radius: var(--radius-sm);
  background: var(--surface-2);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: var(--text-3);
  transition: background 0.1s, border-color 0.1s, color 0.1s, transform 0.08s;
}
.dp-btn:active, .dp-btn.hit {
  background: var(--accent-dim);
  border-color: rgba(232,255,122,0.3);
  color: var(--accent);
  transform: scale(0.92);
}
.dp-btn svg {
  width: clamp(12px, 3vmin, 18px);
  height: clamp(12px, 3vmin, 18px);
  fill: currentColor;
  pointer-events: none;
}
.dp-empty {
  background: transparent !important;
  border: none !important;
  pointer-events: none;
}

/* ── STATUS BAR ─────────────────────────────── */
#status-bar {
  grid-area: bar;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 4px 2px;
  flex-shrink: 0;
}
.sb {
  font-family: var(--mono);
  font-size: clamp(7px, 1.4vmin, 9px);
  letter-spacing: 0.12em;
  color: var(--text-3);
  white-space: nowrap;
}
#status-dot {
  display: inline-block;
  width: 5px; height: 5px;
  border-radius: 50%;
  background: #4caf7d;
  box-shadow: 0 0 6px #4caf7d;
  vertical-align: middle;
  margin-right: 5px;
  animation: dotpulse 2.4s ease-in-out infinite;
}
#status-dot.dead { background: var(--danger); box-shadow: 0 0 6px var(--danger); animation: none; }
@keyframes dotpulse { 0%,100%{opacity:1;} 50%{opacity:0.2;} }

/* ── LANDSCAPE (touch) ──────────────────────── */
#shell.landscape {
  grid-template-rows: 1fr;
  grid-template-columns: 1fr auto;
  grid-template-areas: "board dpad";
}
#shell.landscape #hud {
  display: none;
}
#shell.landscape #board-area {
  grid-area: board;
  position: relative;
}
#shell.landscape #dpad-zone {
  grid-area: dpad;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 0 12px 0 6px;
  gap: 12px;
}
#shell.landscape #status-bar { display: none; }
#shell.landscape #bar { display: none; }

/* Landscape score panel — sits above dpad */
#ls-scores {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  width: 100%;
}
#shell.landscape #ls-scores {
  display: flex;
}

.ls-score-block {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  width: 100%;
}
.ls-score-label {
  font-family: var(--mono);
  font-size: clamp(7px, 1.4vmin, 9px);
  letter-spacing: 0.14em;
  color: var(--text-3);
  text-transform: uppercase;
}
.ls-score-value {
  font-family: var(--mono);
  font-weight: 500;
  font-size: clamp(16px, 3.5vmin, 26px);
  color: var(--text-1);
  letter-spacing: -0.02em;
}
.ls-score-value.accent { color: var(--accent); }

.ls-divider {
  width: 100%;
  height: 1px;
  background: var(--border);
}

/* ── HUD POP ANIMATION ───────────────────────── */
@keyframes valuePop {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.35); color: var(--accent); }
  100% { transform: scale(1); }
}
.val-pop { animation: valuePop 0.28s cubic-bezier(0.34,1.56,0.64,1) forwards; }

/* ── NEW BEST BADGE ──────────────────────────── */
#best-badge {
  position: absolute;
  top: 10px; left: 50%;
  transform: translateX(-50%) translateY(-40px);
  background: var(--accent);
  color: #0e0e10;
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.12em;
  padding: 3px 10px;
  border-radius: 20px;
  opacity: 0;
  pointer-events: none;
  transition: none;
  z-index: 20;
  white-space: nowrap;
}
#best-badge.show {
  animation: badgePop 1.8s cubic-bezier(0.34,1.56,0.64,1) forwards;
}
@keyframes badgePop {
  0%   { opacity: 0; transform: translateX(-50%) translateY(-20px); }
  15%  { opacity: 1; transform: translateX(-50%) translateY(0px); }
  75%  { opacity: 1; transform: translateX(-50%) translateY(0px); }
  100% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
}
</style>
</head>
<body>
<div id="shell">

  <!-- HUD -->
  <div id="hud">
    <div class="hud-block">
      <span class="hud-label">Best</span>
      <span class="hud-value" id="bv">00</span>
    </div>
    <div id="hud-logo">Snake</div>
    <div class="hud-block right">
      <span class="hud-label">Score</span>
      <span class="hud-value" id="sv">00</span>
    </div>
  </div>

  <!-- BOARD -->
  <div id="board-area">
    <div id="board-frame">
      <div id="canvas-wrap">
        <canvas id="gc"></canvas>
        <div id="best-badge">✦ new best</div>

        <!-- START -->
        <div class="overlay active" id="ov-start">
          <span class="ov-eyebrow">ready to play</span>
          <div class="ov-title">Snake</div>
          <div class="ov-divider"></div>
          <div class="ov-keys">
            <span class="ov-key">↑ ↓ ← →</span>
            <span class="ov-key">W A S D</span>
            <span class="ov-key">Swipe</span>
            <span class="ov-key">D-pad</span>
          </div>
          <div class="ov-divider"></div>
          <div class="ov-cta">tap · space · enter</div>
        </div>

        <!-- GAME OVER -->
        <div class="overlay" id="ov-dead">
          <span class="ov-eyebrow" id="ov-eyebrow">game over</span>
          <div class="ov-title" id="ov-dead-title">Nice Try</div>
          <div class="ov-divider"></div>
          <div class="ov-stat-row">
            <div class="ov-stat">
              <span class="ov-stat-label">Score</span>
              <span class="ov-stat-val" id="ov-score-val">00</span>
            </div>
            <div class="ov-stat" id="ov-best-block" style="display:none">
              <span class="ov-stat-label">Best</span>
              <span class="ov-stat-val gold" id="ov-best-val">00</span>
            </div>
          </div>
          <div class="ov-divider"></div>
          <div class="ov-cta">tap · space · enter to retry</div>
        </div>
      </div>
    </div>
  </div>

  <!-- D-PAD -->
  <div id="dpad-zone">
    <!-- Landscape scores — visible only in landscape touch mode -->
    <div id="ls-scores">
      <div class="ls-score-block">
        <span class="ls-score-label">Score</span>
        <span class="ls-score-value" id="ls-sv">00</span>
      </div>
      <div class="ls-divider"></div>
      <div class="ls-score-block">
        <span class="ls-score-label">Best</span>
        <span class="ls-score-value accent" id="ls-bv">00</span>
      </div>
      <div class="ls-divider"></div>
    </div>
    <div>
      <div id="dpad">
        <div class="dp-empty"></div>
        <div class="dp-btn" id="dp-up">
          <svg viewBox="0 0 24 24"><path d="M12 5l8 11H4z"/></svg>
        </div>
        <div class="dp-empty"></div>
        <div class="dp-btn" id="dp-left">
          <svg viewBox="0 0 24 24"><path d="M5 12l11-8v16z"/></svg>
        </div>
        <div class="dp-empty"></div>
        <div class="dp-btn" id="dp-right">
          <svg viewBox="0 0 24 24"><path d="M19 12L8 4v16z"/></svg>
        </div>
        <div class="dp-empty"></div>
        <div class="dp-btn" id="dp-down">
          <svg viewBox="0 0 24 24"><path d="M12 19L4 8h16z"/></svg>
        </div>
        <div class="dp-empty"></div>
      </div>
    </div>
  </div>

  <!-- STATUS BAR -->
  <div id="status-bar">
    <span class="sb"><span id="status-dot"></span><span id="stxt">live</span></span>
    <span class="sb">snake · arcade</span>
    <span class="sb" id="ltag">length 2</span>
  </div>

</div><!-- /shell -->

<script>
/* ═══════════════════════════════════════════════
   SNAKE — Minimal Dark Refactor
   ═══════════════════════════════════════════════ */

// ── DOM ─────────────────────────────────────────
const canvas    = document.getElementById('gc');
const ctx       = canvas.getContext('2d');
const svEl      = document.getElementById('sv');
const bvEl      = document.getElementById('bv');
const ovStart   = document.getElementById('ov-start');
const ovDead    = document.getElementById('ov-dead');
const ovScore   = document.getElementById('ov-score-val');
const ovBestVal = document.getElementById('ov-best-val');
const ovBestBlk = document.getElementById('ov-best-block');
const ovTitle   = document.getElementById('ov-dead-title');
const ovEye     = document.getElementById('ov-eyebrow');
const shellEl   = document.getElementById('shell');
const dpadZone  = document.getElementById('dpad-zone');
const dpad      = document.getElementById('dpad');
const statusDot = document.getElementById('status-dot');
const stxt      = document.getElementById('stxt');
const ltag      = document.getElementById('ltag');
const bestBadge = document.getElementById('best-badge');
const lsSv      = document.getElementById('ls-sv');
const lsBv      = document.getElementById('ls-bv');

// ── Config ───────────────────────────────────────
const BASE_MS    = 155;
const MIN_MS     = 62;
const SPEED_STEP = 4;
const WRAP       = true;
const CELL_MIN   = 12;
const CELL_MAX   = 26;

// ── Palette ──────────────────────────────────────
const COLOR = {
  bg:        '#0e0e10',
  grid:      'rgba(255,255,255,0.022)',
  headFill:  '#e8ff7a',
  headShine: 'rgba(255,255,255,0.28)',
  bodyA:     '#8aad40',
  bodyB:     '#4a6020',
  food:      '#ff6b6b',
  foodGlow:  'rgba(255,107,107,0.22)',
  foodShine: 'rgba(255,200,200,0.65)',
};

// ── State ────────────────────────────────────────
let CS, COLS, ROWS, W, H;
let snake, dir, nextDir, food;
let score = 0, best = 0;
let gameState = 'idle';
let loopId = null;
let foodPhase = 0, eatFlash = 0;

// ── Util ─────────────────────────────────────────
const clamp = (lo, v, hi) => Math.max(lo, Math.min(hi, v));
const isTouch = () => window.matchMedia('(pointer:coarse)').matches || 'ontouchstart' in window;
const isLandscape = () => window.innerWidth > window.innerHeight;
const pad2 = n => String(n).padStart(2, '0');

// ═══════════════════════════════════════════════
//  LAYOUT
// ═══════════════════════════════════════════════
function layout() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const ls = isLandscape();
  const touch = isTouch();

  shellEl.classList.toggle('landscape', ls && touch);
  dpadZone.classList.toggle('visible', touch);

  // D-pad button size
  let dpSize = 0;
  if (touch) {
    dpSize = ls
      ? clamp(40, Math.floor((vh * 0.68) / 3.4), 64)
      : clamp(44, Math.floor(Math.min(vw * 0.44, vh * 0.20)), 68);
  }
  dpad.style.setProperty('--dp', dpSize + 'px');

  // Board available space
  let boardW, boardH;
  if (ls && touch) {
    const colW = dpSize * 3 + 12 + 24;
    boardW = vw - colW - 16;
    boardH = vh - clamp(28, vh * 0.1, 44) - 16;
  } else if (touch) {
    const hudH  = clamp(30, vh * 0.085, 46);
    const barH  = clamp(18, vh * 0.04,  26);
    const dpadH = dpSize * 3 + 12 + clamp(10, vh * 0.018, 22);
    boardW = vw - 24;
    boardH = vh - hudH - barH - dpadH - 20;
  } else {
    const hudH = clamp(32, vh * 0.085, 50);
    const barH = clamp(18, vh * 0.04,  26);
    boardW = vw - 24;
    boardH = vh - hudH - barH - 20;
  }

  boardW = Math.max(80, boardW);
  boardH = Math.max(80, boardH);

  // Cell & grid
  const aspect = boardW / boardH;
  let tCols, tRows;
  if (ls) {
    tRows = clamp(10, Math.round(boardH / 20), 22);
    tCols = clamp(12, Math.round(tRows * aspect), 34);
  } else {
    tCols = clamp(14, Math.round(boardW / 20), 26);
    tRows = clamp(18, Math.round(tCols / aspect), 36);
  }

  const csW = Math.floor(boardW / tCols);
  const csH = Math.floor(boardH / tRows);
  CS   = clamp(CELL_MIN, Math.min(csW, csH), CELL_MAX);
  COLS = Math.floor(boardW / CS);
  ROWS = Math.floor(boardH / CS);
  W    = COLS * CS;
  H    = ROWS * CS;

  canvas.width  = W;  canvas.height  = H;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
}

// ═══════════════════════════════════════════════
//  GAME LOGIC
// ═══════════════════════════════════════════════
function placeFood() {
  let p;
  do {
    p = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
  } while (snake.some(s => s.x === p.x && s.y === p.y));
  food = p; foodPhase = 0;
}

function initGame() {
  layout();
  const cx = Math.floor(COLS / 2), cy = Math.floor(ROWS / 2);
  snake    = [{ x: cx, y: cy }, { x: cx - 1, y: cy }];
  dir      = { x: 1, y: 0 };
  nextDir  = { x: 1, y: 0 };
  score    = 0; eatFlash = 0;
  gameState = 'playing';
  svEl.textContent = pad2(score);
  lsSv.textContent = pad2(score);
  ltag.textContent = 'length 2';
  ovStart.classList.remove('active');
  ovDead.classList.remove('active');
  setAlive();
  placeFood();
  clearInterval(loopId);
  loopId = setInterval(tick, calcSpeed(0));
  draw();
}

function calcSpeed(sc) {
  return clamp(MIN_MS, BASE_MS - sc * SPEED_STEP, BASE_MS);
}

function setAlive() {
  statusDot.className = '';
  stxt.textContent = 'live';
}
function setDead() {
  statusDot.className = 'dead';
  stxt.textContent = 'dead';
}

function tick() {
  if (gameState !== 'playing') return;
  dir = nextDir;
  foodPhase += 0.12;
  if (eatFlash > 0) eatFlash--;

  let nx = snake[0].x + dir.x;
  let ny = snake[0].y + dir.y;

  if (WRAP) {
    nx = (nx + COLS) % COLS;
    ny = (ny + ROWS) % ROWS;
  } else if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS) {
    gameOver(); return;
  }

  const head = { x: nx, y: ny };
  if (snake.some(s => s.x === head.x && s.y === head.y)) { gameOver(); return; }
  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score++;
    eatFlash = 6;
    svEl.textContent = pad2(score);
    lsSv.textContent = pad2(score);
    pop(svEl);
    if (score > best) {
      best = score;
      bvEl.textContent = pad2(best);
      lsBv.textContent = pad2(best);
      pop(bvEl);
      showBestBadge();
    }
    ltag.textContent = 'length ' + snake.length;
    placeFood();
    clearInterval(loopId);
    loopId = setInterval(tick, calcSpeed(score));
  } else {
    snake.pop();
  }
  draw();
}

function pop(el) {
  el.classList.remove('val-pop');
  void el.offsetWidth;
  el.classList.add('val-pop');
}

function showBestBadge() {
  bestBadge.classList.remove('show');
  void bestBadge.offsetWidth;
  bestBadge.classList.add('show');
}

function gameOver() {
  clearInterval(loopId);
  gameState = 'dead';
  setDead();

  const isNew = score > 0 && score >= best;
  ovEye.textContent   = score >= 10 ? 'well played' : 'game over';
  ovTitle.textContent = score >= 20 ? 'Impressive' : score >= 10 ? 'Well Done' : score >= 5 ? 'Not Bad' : 'Nice Try';
  ovTitle.className   = 'ov-title' + (score === 0 ? ' danger' : '');
  ovScore.textContent = pad2(score);

  if (score > 0) {
    ovBestVal.textContent = pad2(best);
    ovBestBlk.style.display = 'flex';
  } else {
    ovBestBlk.style.display = 'none';
  }

  ovDead.classList.add('active');

  // subtle death wash
  let f = 0;
  const fl = setInterval(() => {
    ctx.fillStyle = f % 2 === 0 ? 'rgba(255,50,50,0.07)' : 'transparent';
    ctx.fillRect(0, 0, W, H);
    if (++f > 5) clearInterval(fl);
  }, 70);
}

function tryStart() {
  if (gameState === 'idle' || gameState === 'dead') initGame();
}

// ═══════════════════════════════════════════════
//  DRAWING
// ═══════════════════════════════════════════════
function draw() {
  // Background
  ctx.fillStyle = COLOR.bg;
  ctx.fillRect(0, 0, W, H);

  // Subtle grid
  ctx.strokeStyle = COLOR.grid;
  ctx.lineWidth = 1;
  for (let c = 1; c < COLS; c++) {
    ctx.beginPath();
    ctx.moveTo(c * CS, 0);
    ctx.lineTo(c * CS, H);
    ctx.stroke();
  }
  for (let r = 1; r < ROWS; r++) {
    ctx.beginPath();
    ctx.moveTo(0, r * CS);
    ctx.lineTo(W, r * CS);
    ctx.stroke();
  }

  drawFood();

  for (let i = snake.length - 1; i > 0; i--) drawBody(snake[i], i);
  drawHead(snake[0]);

  if (eatFlash > 0) {
    ctx.fillStyle = `rgba(232,255,122,${eatFlash * 0.018})`;
    ctx.fillRect(0, 0, W, H);
  }
}

function drawFood() {
  const cx = food.x * CS + CS / 2;
  const cy = food.y * CS + CS / 2;
  const pulse = 0.88 + Math.sin(foodPhase) * 0.12;
  const r = Math.max(3, (CS / 2 - 2) * pulse);

  // soft glow
  const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, r * 2.8);
  glow.addColorStop(0,   'rgba(255,107,107,0.18)');
  glow.addColorStop(1,   'rgba(255,107,107,0)');
  ctx.beginPath();
  ctx.arc(cx, cy, r * 2.8, 0, Math.PI * 2);
  ctx.fillStyle = glow;
  ctx.fill();

  // circle body
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fillStyle = COLOR.food;
  ctx.shadowColor = COLOR.food;
  ctx.shadowBlur = clamp(4, CS * 0.45, 14);
  ctx.fill();
  ctx.shadowBlur = 0;

  // small shine
  ctx.beginPath();
  ctx.arc(cx - r * 0.28, cy - r * 0.28, r * 0.26, 0, Math.PI * 2);
  ctx.fillStyle = COLOR.foodShine;
  ctx.fill();
}

function drawBody(seg, idx) {
  const x = seg.x * CS, y = seg.y * CS;
  const pad = 2;
  const t = idx / Math.max(snake.length - 1, 1);
  const alpha = Math.max(0.16, 1 - t * 0.84);
  const r = Math.max(2, CS * 0.2);

  ctx.beginPath();
  ctx.roundRect(x + pad, y + pad, CS - pad * 2, CS - pad * 2, r);
  ctx.fillStyle = `rgba(138,173,64,${alpha * 0.9})`;
  if (idx < 3) {
    ctx.shadowColor = 'rgba(138,173,64,0.3)';
    ctx.shadowBlur  = 6;
  }
  ctx.fill();
  ctx.shadowBlur = 0;
}

function drawHead(seg) {
  const x = seg.x * CS, y = seg.y * CS;
  const pad = 1.5;
  const sw = CS - pad * 2, sh = CS - pad * 2;
  const r = Math.max(3, CS * 0.25);

  // head fill
  ctx.beginPath();
  ctx.roundRect(x + pad, y + pad, sw, sh, r);
  ctx.fillStyle = COLOR.headFill;
  ctx.shadowColor = 'rgba(232,255,122,0.45)';
  ctx.shadowBlur = clamp(6, CS * 0.6, 18);
  ctx.fill();
  ctx.shadowBlur = 0;

  // top shine strip
  ctx.beginPath();
  ctx.roundRect(x + pad + 2, y + pad + 2, sw * 0.5, sh * 0.26, [r - 1, r - 1, 0, 0]);
  ctx.fillStyle = COLOR.headShine;
  ctx.fill();

  drawEyes(x, y);
}

function drawEyes(x, y) {
  const d = dir, c = CS;
  const eo = Math.max(3, c * 0.22);
  const ei = Math.max(2, c * 0.28);
  let e1x, e1y, e2x, e2y;

  if      (d.x ===  1) { e1x = x+c-eo;   e1y = y+ei;     e2x = x+c-eo;   e2y = y+c-ei-1; }
  else if (d.x === -1) { e1x = x+eo-1;   e1y = y+ei;     e2x = x+eo-1;   e2y = y+c-ei-1; }
  else if (d.y === -1) { e1x = x+ei;     e1y = y+eo-1;   e2x = x+c-ei-1; e2y = y+eo-1;   }
  else                 { e1x = x+ei;     e1y = y+c-eo;   e2x = x+c-ei-1; e2y = y+c-eo;   }

  const er = Math.max(1, c * 0.11);
  const pr = Math.max(0.5, er * 0.52);

  // whites
  ctx.fillStyle = 'rgba(20,20,22,0.9)';
  ctx.beginPath(); ctx.arc(e1x, e1y, er, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(e2x, e2y, er, 0, Math.PI * 2); ctx.fill();
  // pupils
  ctx.fillStyle = '#0e0e10';
  ctx.beginPath(); ctx.arc(e1x, e1y, pr, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(e2x, e2y, pr, 0, Math.PI * 2); ctx.fill();
}

// ═══════════════════════════════════════════════
//  INPUT
// ═══════════════════════════════════════════════
function move(d) {
  if (gameState !== 'playing') return;
  const map = { up:{x:0,y:-1}, down:{x:0,y:1}, left:{x:-1,y:0}, right:{x:1,y:0} };
  const n = map[d];
  if (d === 'up'    && dir.y !==  1) nextDir = n;
  if (d === 'down'  && dir.y !== -1) nextDir = n;
  if (d === 'left'  && dir.x !==  1) nextDir = n;
  if (d === 'right' && dir.x !== -1) nextDir = n;
}

// Keyboard
const KEYS = {
  ArrowUp:'up', ArrowDown:'down', ArrowLeft:'left', ArrowRight:'right',
  w:'up', s:'down', a:'left', d:'right',
  W:'up', S:'down', A:'left', D:'right'
};
document.addEventListener('keydown', e => {
  if (KEYS[e.key]) {
    e.preventDefault();
    if (gameState !== 'playing') { initGame(); return; }
    move(KEYS[e.key]);
  } else if (e.key === ' ' || e.key === 'Enter') {
    e.preventDefault(); tryStart();
  }
});

// Swipe
let tx0 = 0, ty0 = 0;
canvas.addEventListener('touchstart', e => { tx0 = e.touches[0].clientX; ty0 = e.touches[0].clientY; }, { passive: true });
canvas.addEventListener('touchend', e => {
  if (gameState !== 'playing') { tryStart(); return; }
  const dx = e.changedTouches[0].clientX - tx0;
  const dy = e.changedTouches[0].clientY - ty0;
  if (Math.abs(dx) < 10 && Math.abs(dy) < 10) return;
  Math.abs(dx) > Math.abs(dy) ? move(dx > 0 ? 'right' : 'left') : move(dy > 0 ? 'down' : 'up');
}, { passive: true });

// D-pad
function bindDpad(el, dirName) {
  const on = e => {
    e.preventDefault();
    el.classList.add('hit');
    if (gameState !== 'playing') { initGame(); return; }
    move(dirName);
  };
  const off = () => el.classList.remove('hit');
  el.addEventListener('touchstart',  on,  { passive: false });
  el.addEventListener('touchend',    off, { passive: true });
  el.addEventListener('touchcancel', off, { passive: true });
  el.addEventListener('mousedown',   on);
  el.addEventListener('mouseup',     off);
  el.addEventListener('mouseleave',  off);
}
bindDpad(document.getElementById('dp-up'),    'up');
bindDpad(document.getElementById('dp-down'),  'down');
bindDpad(document.getElementById('dp-left'),  'left');
bindDpad(document.getElementById('dp-right'), 'right');

ovStart.addEventListener('click', tryStart);
ovDead.addEventListener('click',  tryStart);

// ═══════════════════════════════════════════════
//  RESIZE
// ═══════════════════════════════════════════════
let rzId = null;
function onResize() {
  clearTimeout(rzId);
  rzId = setTimeout(() => {
    layout();
    if (gameState === 'playing') initGame();
    else drawIdle();
  }, 120);
}
window.addEventListener('resize', onResize);
window.addEventListener('orientationchange', () => setTimeout(onResize, 60));

// ═══════════════════════════════════════════════
//  IDLE SCREEN
// ═══════════════════════════════════════════════
function drawIdle() {
  layout();
  ctx.fillStyle = COLOR.bg;
  ctx.fillRect(0, 0, W, H);

  // subtle grid
  ctx.strokeStyle = COLOR.grid;
  ctx.lineWidth = 1;
  for (let c = 1; c < COLS; c++) { ctx.beginPath(); ctx.moveTo(c*CS,0); ctx.lineTo(c*CS,H); ctx.stroke(); }
  for (let r = 1; r < ROWS; r++) { ctx.beginPath(); ctx.moveTo(0,r*CS); ctx.lineTo(W,r*CS); ctx.stroke(); }

  const cx  = Math.floor(COLS / 2);
  const cy  = Math.floor(ROWS / 2);
  const len = clamp(4, Math.floor(COLS / 3.5), 8);
  const demo = [];
  for (let i = 0; i < len; i++) demo.push({ x: clamp(0, cx - i, COLS - 1), y: cy });
  snake = demo;
  dir   = { x: 1, y: 0 };
  for (let i = demo.length - 1; i > 0; i--) drawBody(demo[i], i);
  drawHead(demo[0]);

  food      = { x: clamp(1, cx + 4, COLS - 2), y: clamp(1, cy - 2, ROWS - 2) };
  foodPhase = 0;
  drawFood();
}

// Idle pulse loop
function idleTick() {
  if (gameState !== 'idle') return;
  foodPhase += 0.055;
  const fx = food.x * CS, fy = food.y * CS;
  ctx.fillStyle = COLOR.bg;
  ctx.fillRect(fx - CS * 1.8, fy - CS * 2.0, CS * 4.6, CS * 4.6);
  // redraw grid patch
  ctx.strokeStyle = COLOR.grid;
  ctx.lineWidth = 1;
  for (let c = 0; c < COLS; c++) { ctx.beginPath(); ctx.moveTo(c*CS,Math.max(0,fy-CS*2)); ctx.lineTo(c*CS,Math.min(H,fy+CS*2.6)); ctx.stroke(); }
  for (let r = 0; r < ROWS; r++) { ctx.beginPath(); ctx.moveTo(Math.max(0,fx-CS*1.8),r*CS); ctx.lineTo(Math.min(W,fx+CS*2.8),r*CS); ctx.stroke(); }
  drawFood();
  requestAnimationFrame(idleTick);
}

// ── Boot ──────────────────────────────────────────
gameState = 'idle';
drawIdle();
idleTick();
</script>
</body>
