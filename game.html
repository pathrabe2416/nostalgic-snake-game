<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>SNAKE</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #070809;
  --surface:     #0d0f10;
  --surface-2:   #131618;
  --surface-3:   #1a1e21;
  --border:      rgba(255,255,255,0.05);
  --border-mid:  rgba(255,255,255,0.09);
  --border-hi:   rgba(255,255,255,0.15);
  --accent-g:    #b8ff3c;
  --accent-c:    #3cffd8;
  --accent-dim:  rgba(184,255,60,0.14);
  --accent-glow: rgba(184,255,60,0.07);
  --text-1:      #f4f4f4;
  --text-2:      #7a8090;
  --text-3:      #363c44;
  --danger:      #ff4d4d;
  --display:     'Bebas Neue', sans-serif;
  --cond:        'Barlow Condensed', sans-serif;
  --sans:        'Barlow', sans-serif;
  --radius-sm:   6px;
  --radius-md:   12px;
  --radius-lg:   18px;
  --radius-xl:   24px;
}

/*
  SCROLL FIX — Root philosophy:
  ─────────────────────────────
  • html/body are NOT locked to overflow:hidden globally.
  • Instead, we use a .game-locked class toggled by JS
    only when the game is actively playing.
  • When an overlay is open (dead / menu / paused),
    .game-locked is removed so the overlay itself can scroll
    on small screens / very short viewports.
  • The #shell element handles the full-screen layout via
    height:100dvh + overflow:hidden when locked, but degrades
    gracefully to min-height + auto overflow when unlocked.
  • touch-action:none is scoped only to the canvas and dpad,
    NOT on body — this prevents the browser from blocking
    native scroll on overlay content.
*/

html {
  width: 100%;
  height: 100%;
  /* Not overflow:hidden globally — let JS manage it */
  background: var(--bg);
  scroll-behavior: smooth;
}

body {
  width: 100%;
  min-height: 100%;
  background: var(--bg);
  font-family: var(--sans);
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  /* touch-action is NOT set here — scoped to game elements only */
}

/* When game is actively playing, lock scroll on body */
body.game-locked {
  overflow: hidden;
  height: 100dvh;
  touch-action: none;
}

/* ── SHELL ──────────────────────────────────────────── */
#shell {
  position: relative;
  width: 100%;
  display: grid;
  grid-template-rows: auto 1fr auto auto;
  grid-template-columns: 1fr;
  grid-template-areas: "hud" "board" "dpad" "bar";
  padding:
    max(14px, env(safe-area-inset-top))
    max(14px, env(safe-area-inset-right))
    max(10px, env(safe-area-inset-bottom))
    max(14px, env(safe-area-inset-left));
  gap: 0;
}

/* When game is locked, shell fills the viewport exactly */
body.game-locked #shell {
  height: 100dvh;
  overflow: hidden;
}

/* When NOT locked (overlay open), shell is at least full height
   but can grow to let overlay content scroll naturally */
body:not(.game-locked) #shell {
  min-height: 100dvh;
}

/* ── HUD ─────────────────────────────────────────────── */
#hud {
  grid-area: hud;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 4px 2px 10px;
  flex-shrink: 0;
}

#hud-scores {
  display: flex;
  align-items: center;
  gap: clamp(12px, 3vw, 28px);
}

.hud-block {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.hud-label {
  font-family: var(--cond);
  font-size: clamp(8px, 1.6vmin, 11px);
  font-weight: 600;
  letter-spacing: 0.22em;
  color: var(--text-3);
  text-transform: uppercase;
}
.hud-value {
  font-family: var(--display);
  font-size: clamp(18px, 4vmin, 30px);
  color: var(--text-1);
  letter-spacing: 0.04em;
  line-height: 1;
  transition: color 0.15s;
}
.hud-value.accented { color: var(--accent-g); }

.hud-sep {
  width: 1px;
  height: clamp(24px, 4.5vmin, 34px);
  background: var(--border-mid);
  flex-shrink: 0;
}

#hud-right {
  display: flex;
  align-items: center;
  gap: clamp(10px, 2vw, 18px);
}

#hud-logo {
  font-family: var(--display);
  font-size: clamp(16px, 4vmin, 26px);
  letter-spacing: 0.22em;
  color: var(--text-1);
}

/* ── MENU BUTTON ─────────────────────────────────────── */
#menu-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: clamp(32px, 6vmin, 40px);
  height: clamp(32px, 6vmin, 40px);
  border-radius: var(--radius-sm);
  background: var(--surface-2);
  border: 1px solid var(--border-mid);
  cursor: pointer;
  flex-shrink: 0;
  transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
}
#menu-btn::before {
  content: '';
  position: absolute; inset: 0;
  border-radius: var(--radius-sm);
  padding: 1px;
  background: linear-gradient(135deg, var(--accent-g), var(--accent-c));
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  opacity: 0;
  transition: opacity 0.2s;
  pointer-events: none;
}
#menu-btn:hover::before, #menu-btn:active::before { opacity: 1; }
#menu-btn:hover {
  background: var(--accent-dim);
  box-shadow: 0 0 14px rgba(184,255,60,0.18);
}
#menu-btn svg {
  width: clamp(13px, 2.8vmin, 17px);
  height: clamp(13px, 2.8vmin, 17px);
  fill: var(--text-2);
  display: block;
  transition: fill 0.15s;
}
#menu-btn:hover svg { fill: var(--accent-g); }

/* ── BOARD ─────────────────────────────────────────── */
#board-area {
  grid-area: board;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 0;
  padding: 2px 0;
}

#board-frame {
  border-radius: var(--radius-xl);
  background: var(--surface);
  border: 1px solid var(--border-mid);
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.025),
    0 0 60px rgba(184,255,60,0.04),
    0 28px 72px rgba(0,0,0,0.7),
    inset 0 1px 0 rgba(255,255,255,0.04);
  overflow: hidden;
  position: relative;
}

#canvas-wrap {
  position: relative;
  display: block;
  line-height: 0;
}

/* Canvas: touch-action none ONLY on the game canvas itself */
#gc {
  display: block;
  touch-action: none;
}

/* ── OVERLAYS ──────────────────────────────────────── */
/*
  SCROLL FIX for overlays:
  ─────────────────────────
  Overlays are position:absolute inside #board-frame, so they
  are clipped to the board dimensions. On very small/short
  screens the overlay content (buttons, stats) may overflow.

  Fix: overlays get overflow-y:auto + -webkit-overflow-scrolling:touch
  AND they use padding so content doesn't touch edges.

  Additionally, when an overlay is active, JS removes .game-locked
  from body so the ENTIRE page can scroll if needed (e.g. on
  extremely short screens where even the overlay can't fit).
  When the overlay closes and play resumes, .game-locked is restored.
*/
.overlay {
  position: absolute; inset: 0;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: clamp(8px, 1.8vmin, 16px);
  background: rgba(7,8,9,0.93);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  z-index: 10;
  padding: 24px 24px max(24px, env(safe-area-inset-bottom));
  animation: ovIn 0.22s cubic-bezier(0.16,1,0.3,1);
  /* KEY FIX: overlays scroll their own content if it overflows */
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  /* Allow touch scrolling inside the overlay */
  touch-action: pan-y;
}
.overlay.active { display: flex; }

@keyframes ovIn {
  from { opacity: 0; transform: scale(0.96); }
  to   { opacity: 1; transform: scale(1); }
}

.ov-eyebrow {
  font-family: var(--cond);
  font-size: clamp(9px, 1.6vmin, 11px);
  font-weight: 600;
  letter-spacing: 0.3em;
  color: var(--text-3);
  text-transform: uppercase;
}

.ov-title {
  font-family: var(--display);
  font-size: clamp(30px, 8vmin, 64px);
  color: var(--text-1);
  letter-spacing: 0.08em;
  line-height: 1;
  text-align: center;
}
.ov-title.danger { color: var(--danger); text-shadow: 0 0 28px rgba(255,77,77,0.4); }
.ov-title.gold   { color: var(--accent-g); text-shadow: 0 0 28px rgba(184,255,60,0.38); }

.ov-divider {
  width: 40px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--border-hi), transparent);
  flex-shrink: 0;
}

.ov-stat-row {
  display: flex;
  gap: clamp(20px, 5vmin, 40px);
  align-items: flex-start;
}
.ov-stat {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
}
.ov-stat-label {
  font-family: var(--cond);
  font-size: clamp(8px, 1.4vmin, 10px);
  font-weight: 600;
  letter-spacing: 0.22em;
  color: var(--text-3);
  text-transform: uppercase;
}
.ov-stat-val {
  font-family: var(--display);
  font-size: clamp(22px, 5.5vmin, 44px);
  color: var(--text-1);
  letter-spacing: 0.06em;
  line-height: 1;
}
.ov-stat-val.gold {
  color: var(--accent-g);
  filter: drop-shadow(0 0 10px rgba(184,255,60,0.45));
}

.ov-cta {
  font-family: var(--cond);
  font-size: clamp(9px, 1.7vmin, 11px);
  font-weight: 600;
  color: var(--text-3);
  letter-spacing: 0.24em;
  text-transform: uppercase;
  animation: blink 1.6s step-end infinite;
  margin-top: 2px;
}
@keyframes blink { 50% { opacity: 0; } }

/* ── OVERLAY BUTTONS ───────────────────────────────── */
.ov-btn-group {
  display: flex;
  flex-direction: column;
  gap: 8px;
  width: 100%;
  max-width: 200px;
  margin-top: 4px;
}

.ov-btn {
  font-family: var(--cond);
  font-size: clamp(10px, 1.9vmin, 13px);
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  border: none;
  border-radius: var(--radius-md);
  padding: clamp(9px, 2.2vmin, 14px) 20px;
  cursor: pointer;
  transition: background 0.15s, color 0.15s, transform 0.1s, box-shadow 0.15s;
  width: 100%;
  text-decoration: none;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  position: relative;
  overflow: hidden;
  /* Buttons inside overlays must be tappable — allow tap gesture */
  touch-action: manipulation;
}
.ov-btn:active { transform: scale(0.96); }

.ov-btn-primary {
  background: var(--accent-g);
  color: #070809;
  box-shadow: 0 0 24px rgba(184,255,60,0.3), 0 4px 12px rgba(0,0,0,0.4);
}
.ov-btn-primary:hover {
  background: #c6ff52;
  box-shadow: 0 0 40px rgba(184,255,60,0.5), 0 4px 16px rgba(0,0,0,0.4);
}
.ov-btn-primary::after {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 60%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
  transform: skewX(-20deg);
  transition: left 0.4s;
}
.ov-btn-primary:hover::after { left: 160%; }

.ov-btn-secondary {
  background: var(--surface-2);
  color: var(--text-2);
  border: 1px solid var(--border-mid);
}
.ov-btn-secondary:hover {
  background: var(--surface-3);
  color: var(--text-1);
  border-color: var(--border-hi);
}

/* ── IN-GAME PAUSE/MENU OVERLAY ─────────────────── */
#ov-menu { z-index: 20; }

/* ── D-PAD ───────────────────────────────────────────── */
#dpad-zone {
  grid-area: dpad;
  display: none;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  padding: 10px 0 4px;
  /* D-pad zone: prevent scroll, only recognize dpad taps */
  touch-action: none;
}
#dpad-zone.visible { display: flex; }

#dpad {
  display: grid;
  grid-template-columns: repeat(3, var(--dp));
  grid-template-rows:    repeat(3, var(--dp));
  gap: 6px;
  --dp: 52px;
}

.dp-btn {
  border-radius: var(--radius-sm);
  background: var(--surface-2);
  border: 1px solid var(--border-mid);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: var(--text-3);
  transition: background 0.1s, border-color 0.1s, color 0.12s, transform 0.08s, box-shadow 0.1s;
  position: relative;
  touch-action: manipulation;
}
.dp-btn::before {
  content: '';
  position: absolute; inset: 0;
  border-radius: var(--radius-sm);
  padding: 1px;
  background: linear-gradient(135deg, var(--accent-g), var(--accent-c));
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  opacity: 0;
  transition: opacity 0.15s;
}
.dp-btn:active::before,
.dp-btn.hit::before { opacity: 1; }

.dp-btn:active, .dp-btn.hit {
  background: var(--accent-dim);
  color: var(--accent-g);
  transform: scale(0.91);
  box-shadow: 0 0 14px rgba(184,255,60,0.2);
}
.dp-btn svg {
  width: clamp(13px, 3vmin, 18px);
  height: clamp(13px, 3vmin, 18px);
  fill: currentColor;
  pointer-events: none;
}
.dp-empty {
  background: transparent !important;
  border: none !important;
  pointer-events: none;
}

/* ── STATUS BAR ──────────────────────────────────────── */
#status-bar {
  grid-area: bar;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 2px 2px;
  flex-shrink: 0;
}
.sb {
  font-family: var(--cond);
  font-size: clamp(8px, 1.5vmin, 10px);
  font-weight: 600;
  letter-spacing: 0.18em;
  color: var(--text-3);
  text-transform: uppercase;
  white-space: nowrap;
}
#status-dot {
  display: inline-block;
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--accent-g);
  box-shadow: 0 0 7px var(--accent-g);
  vertical-align: middle;
  margin-right: 6px;
  animation: dotpulse 2.4s ease-in-out infinite;
}
#status-dot.dead {
  background: var(--danger);
  box-shadow: 0 0 7px var(--danger);
  animation: none;
}
@keyframes dotpulse { 0%,100%{opacity:1;} 50%{opacity:0.18;} }

/* ── LANDSCAPE (touch) ──────────────────────────────── */
#shell.landscape {
  grid-template-rows: 1fr;
  grid-template-columns: 1fr auto;
  grid-template-areas: "board side";
  padding-right: max(10px, env(safe-area-inset-right));
}

#shell.landscape #hud        { display: none; }
#shell.landscape #status-bar { display: none; }

#shell.landscape #board-area {
  grid-area: board;
  padding: 0;
}

#ls-sidebar {
  grid-area: side;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  padding: 10px 10px 10px 8px;
  gap: 8px;
  width: var(--ls-sidebar-w, 190px);
  min-width: 160px;
}

#shell.landscape #ls-sidebar { display: flex; }
#shell.landscape #dpad-zone  { display: none !important; }

#ls-controls {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  width: 100%;
}

#ls-logo {
  font-family: var(--display);
  font-size: clamp(14px, 3.5vmin, 22px);
  letter-spacing: 0.22em;
  color: var(--text-1);
  text-align: center;
}

#ls-scores {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  width: 100%;
}
#shell.landscape #ls-scores { display: flex; }

.ls-score-block {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  width: 100%;
}
.ls-score-label {
  font-family: var(--cond);
  font-size: clamp(7px, 1.4vmin, 9px);
  font-weight: 600;
  letter-spacing: 0.22em;
  color: var(--text-3);
  text-transform: uppercase;
}
.ls-score-value {
  font-family: var(--display);
  font-size: clamp(18px, 4vmin, 30px);
  color: var(--text-1);
  letter-spacing: 0.06em;
  line-height: 1;
}
.ls-score-value.accent { color: var(--accent-g); }
.ls-divider {
  width: 100%; height: 1px;
  background: var(--border);
}

#ls-dpad-bottom {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  flex: 1;
  width: 100%;
  padding-bottom: max(4px, env(safe-area-inset-bottom));
  touch-action: none;
}

/* ── SCORE POP ──────────────────────────────────── */
@keyframes valuePop {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.4); color: var(--accent-g); filter: drop-shadow(0 0 6px var(--accent-g)); }
  100% { transform: scale(1); }
}
.val-pop { animation: valuePop 0.3s cubic-bezier(0.34,1.56,0.64,1) forwards; }

/* ── NEW BEST BADGE ─────────────────────────────── */
#best-badge {
  position: absolute;
  top: 10px; left: 50%;
  transform: translateX(-50%) translateY(-30px);
  background: var(--accent-g);
  color: #070809;
  font-family: var(--cond);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  padding: 4px 12px;
  border-radius: 20px;
  opacity: 0;
  pointer-events: none;
  z-index: 20;
  white-space: nowrap;
  box-shadow: 0 0 16px rgba(184,255,60,0.45);
}
#best-badge.show {
  animation: badgePop 1.9s cubic-bezier(0.34,1.56,0.64,1) forwards;
}
@keyframes badgePop {
  0%   { opacity: 0; transform: translateX(-50%) translateY(-16px); }
  14%  { opacity: 1; transform: translateX(-50%) translateY(4px); }
  72%  { opacity: 1; transform: translateX(-50%) translateY(4px); }
  100% { opacity: 0; transform: translateX(-50%) translateY(-8px); }
}

/* ── SCANLINE ───────────────────────────────────── */
#board-frame::after {
  content: '';
  position: absolute; inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 3px,
    rgba(0,0,0,0.04) 3px,
    rgba(0,0,0,0.04) 4px
  );
  pointer-events: none;
  z-index: 5;
  border-radius: inherit;
}

#board-frame::before {
  content: '';
  position: absolute; inset: 0;
  border-radius: var(--radius-xl);
  background: radial-gradient(ellipse at 50% 0%, rgba(184,255,60,0.06) 0%, transparent 65%);
  pointer-events: none;
  z-index: 1;
}
</style>
</head>
<body>
<div id="shell">

  <!-- HUD (portrait only) -->
  <div id="hud">
    <div id="hud-scores">
      <div class="hud-block">
        <span class="hud-label">Best</span>
        <span class="hud-value" id="bv">00</span>
      </div>
      <div class="hud-sep"></div>
      <div class="hud-block">
        <span class="hud-label">Score</span>
        <span class="hud-value" id="sv">00</span>
      </div>
    </div>
    <div id="hud-right">
      <div id="hud-logo">Snake</div>
      <button id="menu-btn" aria-label="Menu" title="Menu">
        <svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="4.5"  width="16" height="1.6" rx="0.8"/>
          <rect x="2" y="9.2"  width="16" height="1.6" rx="0.8"/>
          <rect x="2" y="13.9" width="16" height="1.6" rx="0.8"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- BOARD -->
  <div id="board-area">
    <div id="board-frame">
      <div id="canvas-wrap">
        <canvas id="gc"></canvas>
        <div id="best-badge">✦ new best</div>

        <!-- GAME OVER OVERLAY -->
        <div class="overlay" id="ov-dead">
          <span class="ov-eyebrow" id="ov-eyebrow">game over</span>
          <div class="ov-title" id="ov-dead-title">Nice Try</div>
          <div class="ov-divider"></div>
          <div class="ov-stat-row">
            <div class="ov-stat">
              <span class="ov-stat-label">Score</span>
              <span class="ov-stat-val" id="ov-score-val">00</span>
            </div>
            <div class="ov-stat" id="ov-best-block" style="display:none">
              <span class="ov-stat-label">Best</span>
              <span class="ov-stat-val gold" id="ov-best-val">00</span>
            </div>
          </div>
          <div class="ov-divider"></div>
          <div class="ov-btn-group">
            <button class="ov-btn ov-btn-primary" id="btn-play-again">▶ &nbsp;Play Again</button>
            <a href="index.html" class="ov-btn ov-btn-secondary">⌂ &nbsp;Main Menu</a>
          </div>
        </div>

        <!-- IN-GAME MENU OVERLAY -->
        <div class="overlay" id="ov-menu">
          <span class="ov-eyebrow">paused</span>
          <div class="ov-title">Menu</div>
          <div class="ov-divider"></div>
          <div class="ov-btn-group">
            <button class="ov-btn ov-btn-primary" id="btn-resume">▶ &nbsp;Resume</button>
            <button class="ov-btn ov-btn-secondary" id="btn-restart">↺ &nbsp;Restart</button>
            <a href="index.html" class="ov-btn ov-btn-secondary">⌂ &nbsp;Main Menu</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- D-PAD ZONE (portrait only) -->
  <div id="dpad-zone">
    <div>
      <div id="dpad">
        <div class="dp-empty"></div>
        <div class="dp-btn" id="dp-up">
          <svg viewBox="0 0 24 24"><path d="M12 5l8 11H4z"/></svg>
        </div>
        <div class="dp-empty"></div>
        <div class="dp-btn" id="dp-left">
          <svg viewBox="0 0 24 24"><path d="M5 12l11-8v16z"/></svg>
        </div>
        <div class="dp-empty"></div>
        <div class="dp-btn" id="dp-right">
          <svg viewBox="0 0 24 24"><path d="M19 12L8 4v16z"/></svg>
        </div>
        <div class="dp-empty"></div>
        <div class="dp-btn" id="dp-down">
          <svg viewBox="0 0 24 24"><path d="M12 19L4 8h16z"/></svg>
        </div>
        <div class="dp-empty"></div>
      </div>
    </div>
  </div>

  <!-- STATUS BAR (portrait only) -->
  <div id="status-bar">
    <span class="sb"><span id="status-dot"></span><span id="stxt">live</span></span>
    <span class="sb">snake · arcade</span>
    <span class="sb" id="ltag">length 2</span>
  </div>

  <!-- LANDSCAPE SIDEBAR -->
  <div id="ls-sidebar">
    <div id="ls-controls">
      <div id="ls-logo">Snake</div>
      <div id="ls-menu-btn-slot"></div>
    </div>
    <div id="ls-scores">
      <div class="ls-score-block">
        <span class="ls-score-label">Score</span>
        <span class="ls-score-value" id="ls-sv">00</span>
      </div>
      <div class="ls-divider"></div>
      <div class="ls-score-block">
        <span class="ls-score-label">Best</span>
        <span class="ls-score-value accent" id="ls-bv">00</span>
      </div>
      <div class="ls-divider"></div>
    </div>
    <div id="ls-dpad-bottom"></div>
  </div>

</div><!-- /shell -->

<script>
/* ══════════════════════════════════════════════════
   SNAKE — scroll-aware build
   ══════════════════════════════════════════════════ */

// ── DOM ──────────────────────────────────────────
const canvas     = document.getElementById('gc');
const ctx        = canvas.getContext('2d');
const svEl       = document.getElementById('sv');
const bvEl       = document.getElementById('bv');
const ovDead     = document.getElementById('ov-dead');
const ovMenu     = document.getElementById('ov-menu');
const ovScore    = document.getElementById('ov-score-val');
const ovBestVal  = document.getElementById('ov-best-val');
const ovBestBlk  = document.getElementById('ov-best-block');
const ovTitle    = document.getElementById('ov-dead-title');
const ovEye      = document.getElementById('ov-eyebrow');
const shellEl    = document.getElementById('shell');
const dpadZone   = document.getElementById('dpad-zone');
const dpadGrid   = document.getElementById('dpad');
const statusDot  = document.getElementById('status-dot');
const stxt       = document.getElementById('stxt');
const ltag       = document.getElementById('ltag');
const bestBadge  = document.getElementById('best-badge');
const lsSv       = document.getElementById('ls-sv');
const lsBv       = document.getElementById('ls-bv');
const menuBtn    = document.getElementById('menu-btn');
const lsSidebar  = document.getElementById('ls-sidebar');
const lsDpadBot  = document.getElementById('ls-dpad-bottom');
const lsMenuSlot = document.getElementById('ls-menu-btn-slot');

// ── Config ───────────────────────────────────────
const BASE_MS    = 150;
const MIN_MS     = 60;
const SPEED_STEP = 4;
const WRAP       = true;
const CELL_MIN   = 12;
const CELL_MAX   = 26;

// ── Palette ──────────────────────────────────────
const COLOR = {
  bg:        '#070809',
  grid:      'rgba(255,255,255,0.022)',
  headFill:  '#b8ff3c',
  headShine: 'rgba(255,255,255,0.26)',
  bodyHi:    '#7ec820',
  bodyLo:    '#3a5f10',
  food:      '#ff4d4d',
  foodGlow:  'rgba(255,77,77,0.2)',
  foodShine: 'rgba(255,200,200,0.65)',
};

// ── State ────────────────────────────────────────
let CS, COLS, ROWS, W, H;
let snake, dir, nextDir, food;
let score = 0, best = 0;
let gameState = 'playing';
let loopId = null;
let foodPhase = 0;
let domIsLandscape = false;

// ── Util ─────────────────────────────────────────
const clamp       = (lo, v, hi) => Math.max(lo, Math.min(hi, v));
const isTouch     = () => window.matchMedia('(pointer:coarse)').matches || 'ontouchstart' in window;
const isLandscape = () => window.innerWidth > window.innerHeight;
const pad2        = n => String(n).padStart(2, '0');

// ══════════════════════════════════════════════════
//  SCROLL LOCK MANAGEMENT
//  ─────────────────────────────────────────────────
//  The single source of truth for whether the page
//  should be scroll-locked. We track how many overlays
//  are open; when that count is > 0 we unlock scroll,
//  when 0 and game is playing we re-lock.
// ══════════════════════════════════════════════════
let openOverlayCount = 0;

function lockScroll() {
  // Only lock when playing with no overlays open
  if (openOverlayCount === 0 && gameState === 'playing') {
    document.body.classList.add('game-locked');
  }
}

function unlockScroll() {
  document.body.classList.remove('game-locked');
}

function overlayOpened() {
  openOverlayCount++;
  unlockScroll();
}

function overlayClosed() {
  openOverlayCount = Math.max(0, openOverlayCount - 1);
  // Only re-lock if we're back to playing and no overlays remain
  if (openOverlayCount === 0 && gameState === 'playing') {
    lockScroll();
  }
}

// ══════════════════════════════════════════════════
//  CANVAS TOUCH — block scroll only on the canvas
//  itself, not on overlays or the rest of the page.
// ══════════════════════════════════════════════════
canvas.addEventListener('touchmove', e => {
  // Only block touchmove scroll on canvas during active play
  if (gameState === 'playing') e.preventDefault();
}, { passive: false });

// ══════════════════════════════════════════════════
//  LANDSCAPE DOM REPARENTING
// ══════════════════════════════════════════════════
function syncLandscapeDOM(ls) {
  if (ls === domIsLandscape) return;
  domIsLandscape = ls;

  if (ls) {
    lsDpadBot.appendChild(dpadGrid);
    const clone = menuBtn.cloneNode(true);
    clone.id = 'menu-btn-ls-clone';
    clone.addEventListener('click', e => { e.stopPropagation(); openMenu(); });
    lsMenuSlot.innerHTML = '';
    lsMenuSlot.appendChild(clone);
  } else {
    const dpadZoneInner = dpadZone.querySelector('div');
    dpadZoneInner.appendChild(dpadGrid);
    lsMenuSlot.innerHTML = '';
  }
}

// ══════════════════════════════════════════════════
//  LAYOUT
// ══════════════════════════════════════════════════
function layout() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const ls = isLandscape();
  const touch = isTouch();

  shellEl.classList.toggle('landscape', ls && touch);

  if (!ls || !touch) {
    dpadZone.classList.toggle('visible', touch);
  } else {
    dpadZone.classList.remove('visible');
  }

  syncLandscapeDOM(ls && touch);

  let dpSize = 0;
  if (touch) {
    dpSize = ls
      ? clamp(36, Math.floor((vh * 0.65) / 3.4), 58)
      : clamp(44, Math.floor(Math.min(vw * 0.44, vh * 0.20)), 68);
  }
  dpadGrid.style.setProperty('--dp', dpSize + 'px');

  let sidebarW = 0;
  if (ls && touch) {
    sidebarW = dpSize * 3 + 12 + 20;
    sidebarW = clamp(140, sidebarW, Math.floor(vw * 0.28));
    shellEl.style.setProperty('--ls-sidebar-w', sidebarW + 'px');
    lsSidebar.style.width = sidebarW + 'px';
    const fittedDp = Math.floor((sidebarW - 20 - 12) / 3);
    dpadGrid.style.setProperty('--dp', fittedDp + 'px');
    dpSize = fittedDp;
  }

  let boardW, boardH;

  if (ls && touch) {
    const safeL = parseInt(getComputedStyle(shellEl).paddingLeft)  || 14;
    const safeR = parseInt(getComputedStyle(shellEl).paddingRight) || 10;
    boardW = vw - sidebarW - safeL - safeR - 4;
    boardH = vh - 24;
  } else if (touch) {
    const hudH  = clamp(30, vh * 0.085, 48);
    const barH  = clamp(18, vh * 0.04,  28);
    const dpadH = dpSize * 3 + 12 + clamp(10, vh * 0.018, 22) + 14;
    boardW = vw - 28;
    boardH = vh - hudH - barH - dpadH - 22;
  } else {
    const hudH = clamp(32, vh * 0.085, 52);
    const barH = clamp(18, vh * 0.04,  28);
    boardW = vw - 28;
    boardH = vh - hudH - barH - 22;
  }

  boardW = Math.max(80, boardW);
  boardH = Math.max(80, boardH);

  const aspect = boardW / boardH;
  let tCols, tRows;
  if (ls) {
    tRows = clamp(10, Math.round(boardH / 20), 22);
    tCols = clamp(12, Math.round(tRows * aspect), 34);
  } else {
    tCols = clamp(14, Math.round(boardW / 20), 26);
    tRows = clamp(18, Math.round(tCols / aspect), 36);
  }

  const csW = Math.floor(boardW / tCols);
  const csH = Math.floor(boardH / tRows);
  CS   = clamp(CELL_MIN, Math.min(csW, csH), CELL_MAX);
  COLS = Math.floor(boardW / CS);
  ROWS = Math.floor(boardH / CS);
  W    = COLS * CS;
  H    = ROWS * CS;

  canvas.width  = W;  canvas.height  = H;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
}

// ══════════════════════════════════════════════════
//  GAME LOGIC
// ══════════════════════════════════════════════════
function placeFood() {
  let p;
  do {
    p = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
  } while (snake.some(s => s.x === p.x && s.y === p.y));
  food = p; foodPhase = 0;
}

function initGame() {
  layout();
  const cx = Math.floor(COLS / 2), cy = Math.floor(ROWS / 2);
  snake    = [{ x: cx, y: cy }, { x: cx - 1, y: cy }];
  dir      = { x: 1, y: 0 };
  nextDir  = { x: 1, y: 0 };
  score    = 0;
  gameState = 'playing';
  openOverlayCount = 0;   // reset on new game
  lockScroll();            // lock immediately when game starts
  svEl.textContent = pad2(score);
  lsSv.textContent = pad2(score);
  ltag.textContent = 'length 2';
  closeAllOverlays();
  setAlive();
  placeFood();
  clearInterval(loopId);
  loopId = setInterval(tick, calcSpeed(0));
  draw();
}

function calcSpeed(sc) {
  return clamp(MIN_MS, BASE_MS - sc * SPEED_STEP, BASE_MS);
}

function setAlive() {
  statusDot.className = '';
  stxt.textContent = 'live';
}
function setDead() {
  statusDot.className = 'dead';
  stxt.textContent = 'dead';
}

function closeAllOverlays() {
  if (ovDead.classList.contains('active')) {
    ovDead.classList.remove('active');
    overlayClosed();
  }
  if (ovMenu.classList.contains('active')) {
    ovMenu.classList.remove('active');
    overlayClosed();
  }
  // Safety reset
  openOverlayCount = 0;
}

function showOverlay(el) {
  el.classList.add('active');
  overlayOpened();
}

function hideOverlay(el) {
  if (el.classList.contains('active')) {
    el.classList.remove('active');
    overlayClosed();
  }
}

function tick() {
  if (gameState !== 'playing') return;
  dir = nextDir;
  foodPhase += 0.12;

  let nx = snake[0].x + dir.x;
  let ny = snake[0].y + dir.y;

  if (WRAP) {
    nx = (nx + COLS) % COLS;
    ny = (ny + ROWS) % ROWS;
  } else if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS) {
    gameOver(); return;
  }

  const head = { x: nx, y: ny };
  if (snake.some(s => s.x === head.x && s.y === head.y)) { gameOver(); return; }
  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score++;
    svEl.textContent = pad2(score);
    lsSv.textContent = pad2(score);
    pop(svEl);
    if (score > best) {
      best = score;
      bvEl.textContent = pad2(best);
      lsBv.textContent = pad2(best);
      pop(bvEl);
      showBestBadge();
    }
    ltag.textContent = 'length ' + snake.length;
    placeFood();
    clearInterval(loopId);
    loopId = setInterval(tick, calcSpeed(score));
  } else {
    snake.pop();
  }
  draw();
}

function pop(el) {
  el.classList.remove('val-pop');
  void el.offsetWidth;
  el.classList.add('val-pop');
}

function showBestBadge() {
  bestBadge.classList.remove('show');
  void bestBadge.offsetWidth;
  bestBadge.classList.add('show');
}

function gameOver() {
  clearInterval(loopId);
  gameState = 'dead';
  setDead();
  unlockScroll();  // unlock so overlay + page can scroll freely

  ovEye.textContent   = score >= 10 ? 'well played' : 'game over';
  ovTitle.textContent = score >= 20 ? 'Impressive' : score >= 10 ? 'Well Done' : score >= 5 ? 'Not Bad' : 'Nice Try';
  ovTitle.className   = 'ov-title' + (score === 0 ? ' danger' : score >= 10 ? ' gold' : '');
  ovScore.textContent = pad2(score);

  if (score > 0) {
    ovBestVal.textContent = pad2(best);
    ovBestBlk.style.display = 'flex';
  } else {
    ovBestBlk.style.display = 'none';
  }

  let f = 0;
  const fl = setInterval(() => {
    ctx.fillStyle = f % 2 === 0 ? 'rgba(255,60,60,0.08)' : 'transparent';
    ctx.fillRect(0, 0, W, H);
    if (++f > 5) clearInterval(fl);
  }, 65);

  setTimeout(() => showOverlay(ovDead), 340);
}

// ══════════════════════════════════════════════════
//  DRAWING
// ══════════════════════════════════════════════════
function draw() {
  ctx.fillStyle = COLOR.bg;
  ctx.fillRect(0, 0, W, H);

  ctx.strokeStyle = COLOR.grid;
  ctx.lineWidth = 1;
  for (let c = 1; c < COLS; c++) {
    ctx.beginPath(); ctx.moveTo(c*CS, 0); ctx.lineTo(c*CS, H); ctx.stroke();
  }
  for (let r = 1; r < ROWS; r++) {
    ctx.beginPath(); ctx.moveTo(0, r*CS); ctx.lineTo(W, r*CS); ctx.stroke();
  }

  drawFood();
  for (let i = snake.length - 1; i > 0; i--) drawBody(snake[i], i);
  drawHead(snake[0]);
}

function drawFood() {
  const cx = food.x * CS + CS / 2;
  const cy = food.y * CS + CS / 2;
  const pulse = 0.88 + Math.sin(foodPhase) * 0.12;
  const r = Math.max(3, (CS / 2 - 2) * pulse);

  const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, r * 3);
  glow.addColorStop(0, 'rgba(255,77,77,0.18)');
  glow.addColorStop(1, 'rgba(255,77,77,0)');
  ctx.beginPath(); ctx.arc(cx, cy, r * 3, 0, Math.PI * 2);
  ctx.fillStyle = glow; ctx.fill();

  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fillStyle = COLOR.food;
  ctx.shadowColor = COLOR.food;
  ctx.shadowBlur = clamp(5, CS * 0.5, 16);
  ctx.fill(); ctx.shadowBlur = 0;

  ctx.beginPath(); ctx.arc(cx - r * 0.28, cy - r * 0.28, r * 0.27, 0, Math.PI * 2);
  ctx.fillStyle = COLOR.foodShine; ctx.fill();
}

function drawBody(seg, idx) {
  const x = seg.x * CS, y = seg.y * CS;
  const pad = 2.2;
  const t = idx / Math.max(snake.length - 1, 1);
  const alpha = Math.max(0.13, 1 - t * 0.87);
  const r = Math.max(2, CS * 0.22);

  const col = `rgba(${lerp(126,58,t)},${lerp(200,95,t)},${lerp(32,16,t)},${(alpha * 0.92).toFixed(2)})`;

  ctx.beginPath();
  ctx.roundRect(x + pad, y + pad, CS - pad * 2, CS - pad * 2, r);
  ctx.fillStyle = col;
  if (idx < 3) { ctx.shadowColor = 'rgba(184,255,60,0.22)'; ctx.shadowBlur = 7; }
  ctx.fill(); ctx.shadowBlur = 0;
}

function lerp(a, b, t) { return Math.round(a + (b - a) * t); }

function drawHead(seg) {
  const x = seg.x * CS, y = seg.y * CS;
  const pad = 1.5;
  const sw = CS - pad * 2, sh = CS - pad * 2;
  const r = Math.max(3, CS * 0.28);

  ctx.beginPath(); ctx.roundRect(x + pad, y + pad, sw, sh, r);
  ctx.fillStyle = COLOR.headFill;
  ctx.shadowColor = 'rgba(184,255,60,0.55)';
  ctx.shadowBlur = clamp(7, CS * 0.65, 20);
  ctx.fill(); ctx.shadowBlur = 0;

  ctx.beginPath();
  ctx.roundRect(x + pad + 2, y + pad + 2, sw * 0.52, sh * 0.27, [r - 1, r - 1, 0, 0]);
  ctx.fillStyle = COLOR.headShine; ctx.fill();

  drawEyes(x, y);
}

function drawEyes(x, y) {
  const d = dir, c = CS;
  const eo = Math.max(3, c * 0.22);
  const ei = Math.max(2, c * 0.29);
  let e1x, e1y, e2x, e2y;

  if      (d.x ===  1) { e1x=x+c-eo;   e1y=y+ei;     e2x=x+c-eo;   e2y=y+c-ei-1; }
  else if (d.x === -1) { e1x=x+eo-1;   e1y=y+ei;     e2x=x+eo-1;   e2y=y+c-ei-1; }
  else if (d.y === -1) { e1x=x+ei;     e1y=y+eo-1;   e2x=x+c-ei-1; e2y=y+eo-1;   }
  else                 { e1x=x+ei;     e1y=y+c-eo;   e2x=x+c-ei-1; e2y=y+c-eo;   }

  const er = Math.max(1, c * 0.11);
  const pr = Math.max(0.5, er * 0.5);

  ctx.fillStyle = 'rgba(10,14,10,0.92)';
  ctx.beginPath(); ctx.arc(e1x, e1y, er, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(e2x, e2y, er, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#070809';
  ctx.beginPath(); ctx.arc(e1x, e1y, pr, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(e2x, e2y, pr, 0, Math.PI*2); ctx.fill();
}

// ══════════════════════════════════════════════════
//  INPUT
// ══════════════════════════════════════════════════
function move(d) {
  if (gameState !== 'playing') return;
  const map = { up:{x:0,y:-1}, down:{x:0,y:1}, left:{x:-1,y:0}, right:{x:1,y:0} };
  const n = map[d];
  if (d === 'up'    && dir.y !==  1) nextDir = n;
  if (d === 'down'  && dir.y !== -1) nextDir = n;
  if (d === 'left'  && dir.x !==  1) nextDir = n;
  if (d === 'right' && dir.x !== -1) nextDir = n;
}

const KEYS = {
  ArrowUp:'up', ArrowDown:'down', ArrowLeft:'left', ArrowRight:'right',
  w:'up', s:'down', a:'left', d:'right',
  W:'up', S:'down', A:'left', D:'right'
};
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { e.preventDefault(); openMenu(); return; }
  if (KEYS[e.key]) {
    e.preventDefault();
    if (gameState === 'dead') { initGame(); return; }
    if (gameState === 'paused') { resumeGame(); return; }
    move(KEYS[e.key]);
  } else if (e.key === ' ' || e.key === 'Enter') {
    e.preventDefault();
    if (gameState === 'paused') { resumeGame(); return; }
    if (gameState === 'dead') initGame();
  }
});

let tx0 = 0, ty0 = 0;
canvas.addEventListener('touchstart', e => {
  tx0 = e.touches[0].clientX;
  ty0 = e.touches[0].clientY;
}, { passive: true });
canvas.addEventListener('touchend', e => {
  if (gameState !== 'playing') { if (gameState === 'dead') initGame(); return; }
  const dx = e.changedTouches[0].clientX - tx0;
  const dy = e.changedTouches[0].clientY - ty0;
  if (Math.abs(dx) < 10 && Math.abs(dy) < 10) return;
  Math.abs(dx) > Math.abs(dy) ? move(dx > 0 ? 'right' : 'left') : move(dy > 0 ? 'down' : 'up');
}, { passive: true });

function bindDpad(el, dirName) {
  const on = e => {
    e.preventDefault();
    el.classList.add('hit');
    if (gameState === 'dead') { initGame(); return; }
    if (gameState === 'paused') { resumeGame(); return; }
    move(dirName);
  };
  const off = () => el.classList.remove('hit');
  el.addEventListener('touchstart',  on,  { passive: false });
  el.addEventListener('touchend',    off, { passive: true });
  el.addEventListener('touchcancel', off, { passive: true });
  el.addEventListener('mousedown',   on);
  el.addEventListener('mouseup',     off);
  el.addEventListener('mouseleave',  off);
}
bindDpad(document.getElementById('dp-up'),    'up');
bindDpad(document.getElementById('dp-down'),  'down');
bindDpad(document.getElementById('dp-left'),  'left');
bindDpad(document.getElementById('dp-right'), 'right');

function openMenu() {
  if (gameState === 'dead') return;
  if (gameState === 'playing') {
    clearInterval(loopId);
    gameState = 'paused';
    showOverlay(ovMenu);   // unlocks scroll via overlayOpened()
  } else if (gameState === 'paused') {
    resumeGame();
  }
}

function resumeGame() {
  if (gameState !== 'paused') return;
  hideOverlay(ovMenu);   // re-locks scroll via overlayClosed() → lockScroll()
  gameState = 'playing';
  lockScroll();
  loopId = setInterval(tick, calcSpeed(score));
}

menuBtn.addEventListener('click', e => { e.stopPropagation(); openMenu(); });

document.getElementById('btn-play-again').addEventListener('click', e => {
  e.stopPropagation(); initGame();
});
document.getElementById('btn-resume').addEventListener('click', e => {
  e.stopPropagation(); resumeGame();
});
document.getElementById('btn-restart').addEventListener('click', e => {
  e.stopPropagation(); initGame();
});

ovDead.addEventListener('click', e => { if (e.target === ovDead) initGame(); });

// ══════════════════════════════════════════════════
//  RESIZE
// ══════════════════════════════════════════════════
let rzId = null;
function onResize() {
  clearTimeout(rzId);
  rzId = setTimeout(() => {
    if (gameState === 'playing' || gameState === 'paused' || gameState === 'dead') initGame();
    else layout();
  }, 120);
}
window.addEventListener('resize', onResize);
window.addEventListener('orientationchange', () => setTimeout(onResize, 80));

initGame();
